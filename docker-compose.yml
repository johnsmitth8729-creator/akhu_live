version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: akhu_monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always

  django:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    env_file:
      - .env
    environment:
      - MEDIAMTX_API_URL=http://mediamtx:9997
    volumes:
      - .:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    restart: always

  celery:
    build: .
    command: celery -A config worker --loglevel=info
    env_file:
      - .env
    environment:
      - MEDIAMTX_API_URL=http://mediamtx:9997
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres
    restart: always

  celery-beat:
    build: .
    command: celery -A config beat --loglevel=info
    env_file:
      - .env
    environment:
      - MEDIAMTX_API_URL=http://mediamtx:9997
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres
    restart: always

  mediamtx:
    image: bluenviron/mediamtx:latest
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
      - "9997:9997"
    restart: always

  coturn:
    image: coturn/coturn:latest
    volumes:
      - ./turnserver.conf:/etc/turnserver.conf
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - django
      - mediamtx
    restart: always

volumes:
  pgdata:
  media_volume:
  static_volume:
