    #     location /static/ {
    #         alias /home/boss/akhu_live/staticfiles/;
    #         expires 30d;
    #     }
    #     location /media/ {
    #         alias /home/boss/akhu_live/media/;
    #     }
    #     location / {
    #         proxy_pass http://django_backend;
