events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;
    client_max_body_size 100M;

    upstream django_backend {
        server 192.168.1.231:8000;
    }

    upstream mediamtx_webrtc {
        server 192.168.1.231:8889;
    }

    upstream mediamtx_hls {
        server 192.168.1.231:8888;
    }

    # ─── HTTP → HTTPS redirect (domen bo'lsa) ───────────────────────────
    # server {
    #     listen 80;
    #     server_name live.akhu.uz;
    #     return 301 https://$host$request_uri;
    # }

    # ─── HTTP Server (IP yoki domen uchun) ──────────────────────────────
    server {
        listen 80;
        server_name _;

        # Static fayllar (Nginx to'g'ridan-to'g'ri beradi — tez)
        location /static/ {
            alias /home/boss/akhu_live/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Media fayllar (yuklangan rasmlar va fayllar)
        location /media/ {
            alias /home/boss/akhu_live/media/;
            expires 7d;
        }

        # Django Web App
        location / {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
        }

        # MediaMTX WebRTC WHIP / WHEP endpoints
        location ~ ^/webrtc/(source_[^/]+|camera_[^/]+)/(whip|whep)$ {
            rewrite ^/webrtc/(.*)$ /$1 break;
            proxy_pass http://mediamtx_webrtc;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_read_timeout 600s;
        }

        # MediaMTX HLS streams
        location ~ ^/hls/(source_[^/]+|camera_[^/]+)/(index\.m3u8|[^/]+\.ts|[^/]+\.m4s|init\.mp4)$ {
            rewrite ^/hls/(.*)$ /$1 break;
            proxy_pass http://mediamtx_hls;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin *;
        }
    }

    # ─── HTTPS Server (domen va SSL sertifikat bo'lganda yoqing) ─────────
    # server {
    #     listen 443 ssl;
    #     server_name live.akhu.uz;
    #
