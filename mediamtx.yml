###############################################
# Global settings

# Settings in this section are applied anywhere.

###############################################
# Global settings -> General

# Verbosity of the program; available values are "error", "warn", "info", "debug".
logLevel: info
# Destinations of log messages; available values are "stdout", "file" and "syslog".
logDestinations: [stdout, file]
# When destination is "stdout" or "file", emit logs in structured format (JSONL).
logStructured: false
# When "file" is in logDestinations, this is the file which will receive logs.
logFile: mediamtx.log
# When "syslog" is in logDestinations, use prefix for logs.
sysLogPrefix: mediamtx
# Dump packets to disk. This is useful for debugging.
dumpPackets: false

# Timeout of read operations.
readTimeout: 10s
# Timeout of write operations.
writeTimeout: 10s
# Size of the queue of outgoing packets.
writeQueueSize: 512
# Maximum size of outgoing UDP payloads.
udpMaxPayloadSize: 1452
# Size of the read buffer of every UDP socket.
udpReadBufferSize: 0

runOnConnect:
runOnConnectRestart: false
runOnDisconnect:

###############################################
# Global settings -> Authentication

authMethod: internal

# Internal authentication.
authInternalUsers:
  # Default unprivileged user.
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
        path:
      - action: read
        path:
      - action: playback
        path:

  # Default administrator.
  - user: any
    pass:
    ips: ["127.0.0.1", "::1"]
    permissions:
      - action: api
      - action: metrics
      - action: pprof

authHTTPAddress:
authHTTPFingerprint:
authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof

authJWTJWKS:
authJWTJWKSFingerprint:
authJWTClaimKey: mediamtx_permissions
authJWTExclude: []
authJWTIssuer:
authJWTAudience:

###############################################
# Global settings -> Control API

# Enable the control API server, which allows to control the server.
api: true
# Address of the TCP/HTTP listener.
apiAddress: 0.0.0.0:9997
# Enable HTTPS.
apiEncryption: false
apiServerKey: server.key
apiServerCert: server.crt
# Allowed CORS origins.
apiAllowOrigins: ["*"]
apiTrustedProxies: []

###############################################
# Global settings -> Metrics server

# Enable the metrics server, which allows to extract Prometheus-compatible metrics.
metrics: true
# Address of the TCP/HTTP listener.
metricsAddress: :9998
metricsEncryption: false
metricsServerKey: server.key
metricsServerCert: server.crt
metricsAllowOrigins: ["*"]
metricsTrustedProxies: []

###############################################
# Global settings -> PPROF server

pprof: false
pprofAddress: :9999
pprofEncryption: false
pprofServerKey: server.key
pprofServerCert: server.crt
pprofAllowOrigins: ["*"]
pprofTrustedProxies: []

###############################################
# Global settings -> Playback server

playback: false
playbackAddress: :9996
playbackEncryption: false
playbackServerKey: server.key
playbackServerCert: server.crt
playbackAllowOrigins: ["*"]
playbackTrustedProxies: []

###############################################
# Global settings -> RTSP server

# Enable the RTSP server, which allows to publish and read streams with the RTSP protocol.
rtsp: true
# Enabled RTSP transport protocols. The handshake is always performed with TCP.
rtspTransports: [udp, multicast, tcp]
# Use secure protocol variants (RTSPS, SRTP, SRTCP).
rtspEncryption: "no"
# Address of the TCP/RTSP listener.
rtspAddress: :8554
# Address of the TCP/RTSPS listener.
rtspsAddress: :8322
# Address of the UDP/RTP listener.
rtpAddress: :8000
# Address of the UDP/RTCP listener.
rtcpAddress: :8001
multicastIPRange: 224.1.0.0/16
multicastRTPPort: 8002
multicastRTCPPort: 8003
srtpAddress: :8004
srtcpAddress: :8005
multicastSRTPPort: 8006
multicastSRTCPPort: 8007
rtspServerKey: server.key
rtspServerCert: server.crt
rtspAuthMethods: [basic]
rtspTrustedProxies: []

###############################################
# Global settings -> RTMP server

rtmp: true
rtmpEncryption: "no"
rtmpAddress: :1935
rtmpsAddress: :1936
rtmpServerKey: server.key
rtmpServerCert: server.crt
rtmpTrustedProxies: []

###############################################
# Global settings -> HLS server

# Enable the HLS server, which allows to read streams with the HLS protocol.
hls: true
# Address of the TCP/HTTP listener.
hlsAddress: :8888
# Enable HTTPS.
hlsEncryption: false
hlsServerKey: server.key
hlsServerCert: server.crt
hlsAllowOrigins: ["*"]
hlsTrustedProxies: []
hlsAlwaysRemux: false
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsDirectory: ""
hlsMuxerCloseAfter: 60s
hlsCDNSecret: ""

###############################################
# Global settings -> WebRTC server

# Enable the WebRTC server, which allows to publish and read streams with the WebRTC protocol.
webrtc: true
# Address of the WebRTC TCP/HTTP listener.
webrtcAddress: :8889
# Enable HTTPS handshake encryption for production WebRTC. Set to true in production.
webrtcEncryption: false
# Path to the SSL certificate & key generated by Let's Encrypt (Production Only)
# webrtcServerKey: /etc/letsencrypt/live/live.akhu.uz/privkey.pem
# webrtcServerCert: /etc/letsencrypt/live/live.akhu.uz/fullchain.pem
webrtcAllowOrigins: ["*"]
webrtcTrustedProxies: []
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: ""
webrtcIPsFromInterfaces: true
webrtcIPsFromInterfacesList: []
webrtcAdditionalHosts: [live.akhu.uz]

# Dynamic ICE servers configuration for public routing
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
  - url: turn:live.akhu.uz:3478?transport=udp
    username: username
    password: password

webrtcSTUNGatherTimeout: 5s
webrtcHandshakeTimeout: 10s
webrtcTrackGatherTimeout: 2s

###############################################
# Global settings -> SRT server

srt: true
srtAddress: :8890

###############################################
# MoQ server

moq: true
moqHTTP2Address: :8892
moqHTTP3Address: :8892
moqServerKey: auto.key
moqServerCert: auto.crt
moqAllowOrigins: ["*"]
moqTrustedProxies: []

###############################################
# Default path settings

pathDefaults:
  source: publisher
  sourceFingerprint:
  # Pull dynamic streams only when actively requested by a client
  sourceOnDemand: false
  sourceOnDemandStartTimeout: 15s
  sourceOnDemandCloseAfter: 15s
  maxReaders: 0
  srtReadPassphrase:
  useAbsoluteTimestamp: false

  alwaysAvailable: false
  alwaysAvailableTracks: []
  alwaysAvailableFile: ""

  record: false
  recordPath: ./recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordMaxPartSize: 50M
  recordSegmentDuration: 1h
  recordDeleteAfter: 1d

  overridePublisher: true
  srtPublishPassphrase:
  rtspDemuxMpegts: false

  rtspTransport: automatic
  rtspAnyPort: false
  rtspRangeType:
  rtspRangeStart:
  rtspScale:
  rtspUDPSourcePortRange: [10000, 65535]

  rtpSDP:

  whepBearerToken: ""
  whepSTUNGatherTimeout: 5s
  whepHandshakeTimeout: 10s
  whepTrackGatherTimeout: 2s

  sourceRedirect:

  rpiCameraCamID: 0
  rpiCameraSecondary: false
  rpiCameraWidth: 1920
  rpiCameraHeight: 1080
  rpiCameraHFlip: false
  rpiCameraVFlip: false
  rpiCameraBrightness: 0
  rpiCameraContrast: 1
  rpiCameraSaturation: 1
  rpiCameraSharpness: 1
  rpiCameraExposure: normal
  rpiCameraAWB: auto
  rpiCameraAWBGains: [0, 0]
  rpiCameraDenoise: "off"
  rpiCameraShutter: 0
  rpiCameraMetering: centre
  rpiCameraGain: 0
  rpiCameraEV: 0
  rpiCameraROI:
  rpiCameraHDR: false
  rpiCameraTuningFile:
  rpiCameraMode:
  rpiCameraFPS: 30
  rpiCameraAfMode: continuous
  rpiCameraAfRange: normal
  rpiCameraAfSpeed: normal
  rpiCameraLensPosition: 0.0
  rpiCameraAfWindow:
  rpiCameraFlickerPeriod: 0
  rpiCameraTextOverlayEnable: false
  rpiCameraTextOverlay: "%Y-%m-%d %H:%M:%S - MediaMTX"
  rpiCameraCodec: auto
  rpiCameraIDRPeriod: 60
  rpiCameraBitrate: 5000000
  rpiCameraH264Profile: auto
  rpiCameraH264Level: "4.1"
  rpiCameraMJPEGQuality: 60

  runOnInit:
  runOnInitRestart: false

  runOnDemand:
  runOnDemandRestart: false
  runOnDemandStartTimeout: 10s
  runOnDemandCloseAfter: 10s
  runOnUnDemand:

  runOnReady:
  runOnReadyRestart: false
  runOnNotReady:

  runOnRead:
  runOnReadRestart: false
  runOnUnread:

  runOnRecordSegmentCreate:
  runOnRecordSegmentComplete:

###############################################
# Path settings

paths:
  all_others:
